name: CI

on:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Enable binary cache
        uses: DeterminateSystems/magic-nix-cache-action@v13

      # Blocking lint: statix failures now fail CI.
      - name: Run statix
        run: nix run nixpkgs#statix -- check .

      # Eval-only flake validation (no expensive builds here; builds run in
      # the build-hosts job via the standard checks.x86_64-linux output).
      - name: Flake checks (eval-only)
        run: nix flake check --no-build --accept-flake-config

  build-hosts:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        host: [tandesk, tanlappy, default]
    steps:
      - uses: actions/checkout@v4

      # ubuntu-latest only ships ~14 GiB free. NixOS toplevel builds for this
      # flake can exceed that once toolchains and desktop closures land in
      # /nix/store, so reclaim runner image bloat before installing Nix.
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Enable binary cache
        uses: DeterminateSystems/magic-nix-cache-action@v13

      # Build the NixOS toplevel for this host from the standard checks
      # output. Home Manager is integrated through the NixOS module here, so
      # this also validates the user activation closure without building the
      # standalone home-* check a second time.
      - name: Build NixOS configuration
        run: |
          nix build --accept-flake-config --no-link .#checks.x86_64-linux.nixos-${{ matrix.host }}
          nix-collect-garbage -d

name: CI

on:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Enable binary cache
        uses: DeterminateSystems/magic-nix-cache-action@v13

      # Blocking lint: build the locked flake check (honors flake.lock +
      # statix.toml) so CI does not float on an unpinned nixpkgs#statix.
      - name: Run statix
        run: nix build --accept-flake-config .#checks.x86_64-linux.statix

      # Eval-only flake validation (no expensive builds here; builds run in
      # the build-hosts job via the standard checks.x86_64-linux output).
      - name: Flake checks (eval-only)
        run: nix flake check --no-build --accept-flake-config

  build-hosts:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        host: [tandesk, default, tanlappy]
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Enable binary cache
        uses: DeterminateSystems/magic-nix-cache-action@v13

      # Build the NixOS toplevel for this host from the standard checks
      # output. This also exercises sops file validation at build time.
      - name: Build NixOS configuration
        run: nix build --accept-flake-config .#checks.x86_64-linux.nixos-${{ matrix.host }}

      # Build the standalone Home Manager activation package for this host
      # from the standard checks output.
      - name: Build Home Manager activation
        run: nix build --accept-flake-config .#checks.x86_64-linux.home-${{ matrix.host }}
